<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>ジャストアラーム ー その瞬間を、逃さない。</title>
<style>
  :root {
    --bg: #000000;
    --bg-soft: #0c0c0e;
    --card: #1c1c1e;
    --card-soft: #232326;
    --line: rgba(255, 255, 255, 0.08);
    --ink: #f5f5f7;
    --sub: #8e8e93;
    --sub-dim: #636366;
    --blue: #0a84ff;
    --shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body { height: 100%; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Hiragino Sans",
      "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: radial-gradient(circle at 50% 0%, var(--bg-soft), var(--bg) 60%);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: max(40px, env(safe-area-inset-top)) 20px max(40px, env(safe-area-inset-bottom));
  }

  .app { width: 100%; max-width: 420px; }

  header {
    text-align: center;
    margin-bottom: 36px;
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.22em;
    color: var(--sub-dim);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  h1 {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 0 0 10px;
    color: var(--ink);
  }

  header .tagline {
    font-size: 14.5px;
    color: var(--sub);
    margin: 0;
    letter-spacing: 0.01em;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 34px 26px;
    box-shadow: var(--shadow);
  }

  .card + .card { margin-top: 18px; }

  .field { margin-bottom: 28px; }
  .field:last-of-type { margin-bottom: 30px; }

  .field label {
    display: block;
    font-size: 12.5px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--sub);
    margin-bottom: 12px;
  }

  .time-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .time-row select {
    flex: 1;
    appearance: none;
    -webkit-appearance: none;
    border: 1px solid var(--line);
    background: var(--card-soft);
    border-radius: 14px;
    font-family: inherit;
    font-variant-numeric: tabular-nums;
    font-size: 22px;
    font-weight: 600;
    text-align: center;
    padding: 14px 4px;
    color: var(--ink);
  }

  .time-row select:focus {
    outline: none;
    border-color: var(--blue);
  }

  .time-row .colon {
    font-size: 16px;
    font-weight: 600;
    color: var(--sub-dim);
    width: 8px;
    text-align: center;
  }

  button, .btn {
    font-family: inherit;
    border: none;
    cursor: pointer;
    display: block;
    width: 100%;
    text-align: center;
    text-decoration: none;
  }

  .primary-btn {
    font-size: 16.5px;
    font-weight: 600;
    letter-spacing: 0.01em;
    color: #fff;
    padding: 18px;
    border-radius: 16px;
    background: var(--blue);
    transition: opacity 0.12s ease, transform 0.12s ease;
  }

  .primary-btn:active { transform: scale(0.98); opacity: 0.9; }

  .secondary-btn {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--sub);
    background: transparent;
    padding: 12px;
    margin-top: 6px;
    border: 1px solid transparent;
  }

  .secondary-btn:active { opacity: 0.6; }

  .notice {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 12px;
    background: var(--card-soft);
    border: 1px solid var(--line);
  }

  .notice .mark {
    flex-shrink: 0;
    font-size: 13px;
    font-weight: 700;
    color: var(--blue);
  }

  .notice p {
    margin: 0;
    font-size: 12px;
    line-height: 1.65;
    color: var(--sub);
  }

  #statusCard { text-align: center; }

  .meta-row {
    font-size: 12.5px;
    color: var(--sub);
    margin-bottom: 26px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
  }

  .meta-row .value {
    color: var(--ink);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  .countdown-wrap {
    padding: 10px 0 8px;
    min-height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .countdown {
    font-variant-numeric: tabular-nums;
    font-size: 46px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--ink);
    transition: font-size 0.2s ease;
  }

  .countdown.warn {
    font-size: 104px;
    font-weight: 700;
    color: var(--blue);
    text-shadow: 0 0 34px rgba(10, 132, 255, 0.55);
  }

  .hidden { display: none !important; }

  footer {
    text-align: center;
    margin-top: 26px;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--sub-dim);
  }

  /* 0秒到達時のフルスクリーン表示 */
  .now-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 30px;
    background: #000000;
    padding: 24px;
    text-align: center;
  }

  .now-overlay.show { display: flex; }

  .now-overlay .now-text {
    font-size: clamp(64px, 20vw, 140px);
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.02em;
    text-shadow: 0 0 60px rgba(10, 132, 255, 0.8);
    animation: flash 0.7s ease infinite alternate;
  }

  @keyframes flash {
    from { opacity: 1; }
    to { opacity: 0.5; }
  }

  .now-overlay .close-btn {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.28);
    padding: 13px 30px;
    border-radius: 999px;
    width: auto;
  }
</style>
</head>

<body>
  <div class="app">
    <header>
      <div class="eyebrow">SECOND-PRECISE ALARM</div>
      <h1>ジャストアラーム</h1>
      <p class="tagline">その瞬間を、逃さない。</p>
    </header>

    <div class="card" id="setupCard">
      <div class="field">
        <label>アラーム時刻</label>
        <div class="time-row">
          <select id="hourSelect" aria-label="時"></select>
          <span class="colon">:</span>
          <select id="minuteSelect" aria-label="分"></select>
          <span class="colon">:</span>
          <select id="secondSelect" aria-label="秒"></select>
        </div>
      </div>

      <button class="primary-btn" id="startBtn">アラームをセット</button>

      <div class="notice">
        <span class="mark">ⓘ</span>
        <p>正確に鳴らすには、この画面を開いたままにしてください。LINEなど別アプリを開いている間は、音が遅れたり鳴らない場合があります。</p>
      </div>
    </div>

    <div class="card hidden" id="statusCard">
      <div class="meta-row">
        設定時刻 <span class="value" id="targetDisplay">--:--:--</span>
      </div>

      <div class="countdown-wrap">
        <div class="countdown" id="countdown">--</div>
      </div>

      <button class="secondary-btn" id="cancelBtn">設定に戻る</button>
    </div>

    <footer>JUST ALARM</footer>
  </div>

  <div class="now-overlay" id="nowOverlay">
    <div class="now-text">今です！</div>
    <button class="close-btn" id="closeOverlayBtn">閉じる</button>
  </div>

  <script>
    const hourSelect = document.getElementById("hourSelect");
    const minuteSelect = document.getElementById("minuteSelect");
    const secondSelect = document.getElementById("secondSelect");
    const startBtn = document.getElementById("startBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const setupCard = document.getElementById("setupCard");
    const statusCard = document.getElementById("statusCard");
    const targetDisplay = document.getElementById("targetDisplay");
    const countdownEl = document.getElementById("countdown");
    const nowOverlay = document.getElementById("nowOverlay");
    const closeOverlayBtn = document.getElementById("closeOverlayBtn");

    function fillSelect(select, max) {
      for (let i = 0; i < max; i++) {
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = String(i).padStart(2, "0");
        select.appendChild(opt);
      }
    }

    fillSelect(hourSelect, 24);
    fillSelect(minuteSelect, 60);
    fillSelect(secondSelect, 60);

    (function setDefaultTime() {
      const now = new Date();
      hourSelect.value = now.getHours();
      minuteSelect.value = now.getMinutes();
      secondSelect.value = 0;
    })();

    let alarmDate = null;
    let timer = null;
    let lastSpokenCount = null;
    let alarmLoopId = null;
    let audioContext = null;

    function unlockAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === "suspended") {
        audioContext.resume();
      }
    }

    function speak(text) {
      if (!("speechSynthesis" in window)) return;
      const voice = new SpeechSynthesisUtterance(text);
      voice.lang = "ja-JP";
      voice.rate = 1.0;
      speechSynthesis.speak(voice);
    }

    function beepBurst(times) {
      unlockAudio();
      for (let i = 0; i < times; i++) {
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();
        oscillator.connect(gain);
        gain.connect(audioContext.destination);
        oscillator.frequency.value = 880;
        gain.gain.value = 0.25;
        const start = audioContext.currentTime + i * 0.3;
        oscillator.start(start);
        oscillator.stop(start + 0.16);
      }
    }

    function startAlarmSound() {
      beepBurst(4);
      alarmLoopId = setInterval(() => beepBurst(4), 1400);
    }

    function stopAlarmSound() {
      if (alarmLoopId) {
        clearInterval(alarmLoopId);
        alarmLoopId = null;
      }
    }

    function startStandby() {
      unlockAudio();

      const hour = Number(hourSelect.value);
      const minute = Number(minuteSelect.value);
      const second = Number(secondSelect.value);

      const now = new Date();
      alarmDate = new Date();
      alarmDate.setHours(hour, minute, second, 0);

      if (alarmDate <= now) {
        alarmDate.setDate(alarmDate.getDate() + 1);
      }

      lastSpokenCount = null;
      stopAlarmSound();

      targetDisplay.textContent =
        String(hour).padStart(2, "0") + ":" +
        String(minute).padStart(2, "0") + ":" +
        String(second).padStart(2, "0");

      countdownEl.classList.remove("warn");
      countdownEl.textContent = "待機中";
      nowOverlay.classList.remove("show");

      setupCard.classList.add("hidden");
      statusCard.classList.remove("hidden");

      speak("アラームをセットしました");

      if (timer) clearInterval(timer);
      timer = setInterval(tick, 100);
    }

    function backToSetup() {
      if (timer) clearInterval(timer);
      stopAlarmSound();
      speechSynthesis.cancel();
      nowOverlay.classList.remove("show");
      countdownEl.classList.remove("warn");
      statusCard.classList.add("hidden");
      setupCard.classList.remove("hidden");
    }

    function tick() {
      const now = new Date();
      const diff = alarmDate - now;

      if (diff <= 0) {
        clearInterval(timer);
        countdownEl.classList.remove("warn");
        countdownEl.textContent = "今です";
        nowOverlay.classList.add("show");
        startAlarmSound();
        speak("今です");
        return;
      }

      const secondsLeft = Math.ceil(diff / 1000);

      if (secondsLeft <= 10) {
        countdownEl.classList.add("warn");
        countdownEl.textContent = secondsLeft;
      } else {
        countdownEl.classList.remove("warn");
        const minutes = Math.floor(secondsLeft / 60);
        const seconds = secondsLeft % 60;
        countdownEl.textContent =
          String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");
      }

      if (secondsLeft <= 5 && secondsLeft > 0 && lastSpokenCount !== secondsLeft) {
        lastSpokenCount = secondsLeft;
        speak(String(secondsLeft));
      }
    }

    closeOverlayBtn.addEventListener("click", () => {
      stopAlarmSound();
      nowOverlay.classList.remove("show");
      backToSetup();
    });

    startBtn.addEventListener("click", startStandby);
    cancelBtn.addEventListener("click", backToSetup);
  </script>
</body>
</html>
