<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>ジャストコール ー 予約開始に、秒で勝つ。</title>
<style>
  :root {
    --bg: #000000;
    --bg-soft: #0c0c0e;
    --card: #1c1c1e;
    --card-soft: #232326;
    --line: rgba(255, 255, 255, 0.08);
    --ink: #f5f5f7;
    --sub: #8e8e93;
    --sub-dim: #636366;
    --blue: #0a84ff;
    --blue-dim: #0060c2;
    --shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body { height: 100%; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Hiragino Sans",
      "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: radial-gradient(circle at 50% 0%, var(--bg-soft), var(--bg) 60%);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: max(40px, env(safe-area-inset-top)) 20px max(40px, env(safe-area-inset-bottom));
  }

  .app { width: 100%; max-width: 420px; }

  header {
    text-align: center;
    margin-bottom: 36px;
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.22em;
    color: var(--sub-dim);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  h1 {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 0 0 10px;
    color: var(--ink);
  }

  header .tagline {
    font-size: 14.5px;
    color: var(--sub);
    margin: 0;
    letter-spacing: 0.01em;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 34px 26px;
    box-shadow: var(--shadow);
  }

  .card + .card { margin-top: 18px; }

  .field { margin-bottom: 28px; }
  .field:last-of-type { margin-bottom: 30px; }

  .field label {
    display: block;
    font-size: 12.5px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--sub);
    margin-bottom: 12px;
  }

  .time-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .time-row select {
    flex: 1;
    appearance: none;
    -webkit-appearance: none;
    border: 1px solid var(--line);
    background: var(--card-soft);
    border-radius: 14px;
    font-family: inherit;
    font-variant-numeric: tabular-nums;
    font-size: 22px;
    font-weight: 600;
    text-align: center;
    padding: 14px 4px;
    color: var(--ink);
  }

  .time-row select:focus {
    outline: none;
    border-color: var(--blue);
  }

  .time-row .colon {
    font-size: 16px;
    font-weight: 600;
    color: var(--sub-dim);
    width: 8px;
    text-align: center;
  }

  input[type="tel"] {
    width: 100%;
    font-family: inherit;
    font-variant-numeric: tabular-nums;
    font-size: 19px;
    font-weight: 500;
    padding: 15px 16px;
    border-radius: 14px;
    border: 1px solid var(--line);
    background: var(--card-soft);
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="tel"]:focus { border-color: var(--blue); }
  input[type="tel"]::placeholder { color: var(--sub-dim); }

  button, .btn {
    font-family: inherit;
    border: none;
    cursor: pointer;
    display: block;
    width: 100%;
    text-align: center;
    text-decoration: none;
  }

  .primary-btn {
    font-size: 16.5px;
    font-weight: 600;
    letter-spacing: 0.01em;
    color: #fff;
    padding: 18px;
    border-radius: 16px;
    background: var(--blue);
    transition: opacity 0.12s ease, transform 0.12s ease;
  }

  .primary-btn:active { transform: scale(0.98); opacity: 0.9; }

  .secondary-btn {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--sub);
    background: transparent;
    padding: 12px;
    margin-top: 6px;
    border: 1px solid transparent;
  }

  .secondary-btn:active { opacity: 0.6; }

  #statusCard { text-align: center; }

  .meta-row {
    display: flex;
    justify-content: space-between;
    font-size: 12.5px;
    color: var(--sub);
    margin-bottom: 26px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
  }

  .meta-row .value {
    color: var(--ink);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  .countdown-wrap {
    padding: 10px 0 8px;
    min-height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .countdown {
    font-variant-numeric: tabular-nums;
    font-size: 46px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--ink);
    transition: font-size 0.2s ease;
  }

  .countdown.warn {
    font-size: 104px;
    font-weight: 700;
    color: var(--blue);
    text-shadow: 0 0 34px rgba(10, 132, 255, 0.55);
  }

  .countdown.now {
    font-size: 38px;
    font-weight: 700;
    color: var(--ink);
    animation: flash 0.7s ease infinite alternate;
  }

  @keyframes flash {
    from { opacity: 1; }
    to { opacity: 0.55; }
  }

  .call-btn {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    padding: 20px;
    border-radius: 16px;
    background: var(--blue);
    margin-top: 8px;
    animation: glow 1.1s ease infinite alternate;
  }

  .call-btn.show { display: flex; }

  .call-btn svg { width: 21px; height: 21px; }

  @keyframes glow {
    from { box-shadow: 0 0 0 0 rgba(10, 132, 255, 0.35); }
    to { box-shadow: 0 0 0 14px rgba(10, 132, 255, 0); }
  }

  .hidden { display: none !important; }

  footer {
    text-align: center;
    margin-top: 26px;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--sub-dim);
  }
</style>
</head>

<body>
  <div class="app">
    <header>
      <div class="eyebrow">RESERVATION CALL TIMER</div>
      <h1>ジャストコール</h1>
      <p class="tagline">予約開始に、秒で勝つ。</p>
    </header>

    <div class="card" id="setupCard">
      <div class="field">
        <label>予約開始時刻</label>
        <div class="time-row">
          <select id="hourSelect" aria-label="時"></select>
          <span class="colon">:</span>
          <select id="minuteSelect" aria-label="分"></select>
          <span class="colon">:</span>
          <select id="secondSelect" aria-label="秒"></select>
        </div>
      </div>

      <div class="field">
        <label for="phoneNumber">電話番号</label>
        <input type="tel" id="phoneNumber" inputmode="tel" placeholder="09012345678" autocomplete="tel" />
      </div>

      <button class="primary-btn" id="startBtn">スタンバイ開始</button>
    </div>

    <div class="card hidden" id="statusCard">
      <div class="meta-row">
        <span>設定時刻 <span class="value" id="targetDisplay">--:--:--</span></span>
        <span id="phoneDisplay" class="value"></span>
      </div>

      <div class="countdown-wrap">
        <div class="countdown" id="countdown">--</div>
      </div>

      <a class="call-btn" id="callBtn" href="tel:">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1.1-.2 1.2.4 2.4.6 3.7.6.6 0 1 .4 1 1v3.6c0 .6-.4 1-1 1C10.6 21.2 2.8 13.4 2.8 3.9c0-.6.4-1 1-1H7.4c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.7.1.4 0 .8-.2 1.1L6.6 10.8z" fill="white"/>
        </svg>
        今すぐ電話する
      </a>

      <button class="secondary-btn" id="cancelBtn">設定に戻る</button>
    </div>

    <footer>JUST CALL</footer>
  </div>

  <script>
    const hourSelect = document.getElementById("hourSelect");
    const minuteSelect = document.getElementById("minuteSelect");
    const secondSelect = document.getElementById("secondSelect");
    const phoneNumberInput = document.getElementById("phoneNumber");
    const startBtn = document.getElementById("startBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const setupCard = document.getElementById("setupCard");
    const statusCard = document.getElementById("statusCard");
    const targetDisplay = document.getElementById("targetDisplay");
    const phoneDisplay = document.getElementById("phoneDisplay");
    const countdownEl = document.getElementById("countdown");
    const callBtn = document.getElementById("callBtn");

    function fillSelect(select, max) {
      for (let i = 0; i < max; i++) {
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = String(i).padStart(2, "0");
        select.appendChild(opt);
      }
    }

    fillSelect(hourSelect, 24);
    fillSelect(minuteSelect, 60);
    fillSelect(secondSelect, 60);

    (function setDefaultTime() {
      const now = new Date();
      hourSelect.value = now.getHours();
      minuteSelect.value = now.getMinutes();
      secondSelect.value = 0;
    })();

    let alarmDate = null;
    let timer = null;
    let lastSpokenCount = null;
    let alarmLoopId = null;
    let audioContext = null;

    function unlockAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === "suspended") {
        audioContext.resume();
      }
    }

    function speak(text) {
      if (!("speechSynthesis" in window)) return;
      const voice = new SpeechSynthesisUtterance(text);
      voice.lang = "ja-JP";
      voice.rate = 1.0;
      speechSynthesis.speak(voice);
    }

    function beepBurst(times) {
      unlockAudio();
      for (let i = 0; i < times; i++) {
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();
        oscillator.connect(gain);
        gain.connect(audioContext.destination);
        oscillator.frequency.value = 880;
        gain.gain.value = 0.25;
        const start = audioContext.currentTime + i * 0.3;
        oscillator.start(start);
        oscillator.stop(start + 0.16);
      }
    }

    function startAlarmSound() {
      beepBurst(4);
      alarmLoopId = setInterval(() => beepBurst(4), 1400);
    }

    function stopAlarmSound() {
      if (alarmLoopId) {
        clearInterval(alarmLoopId);
        alarmLoopId = null;
      }
    }

    function cleanPhoneNumber(raw) {
      return raw.replace(/[^0-9+]/g, "");
    }

    function startStandby() {
      unlockAudio();

      const hour = Number(hourSelect.value);
      const minute = Number(minuteSelect.value);
      const second = Number(secondSelect.value);
      const phoneRaw = phoneNumberInput.value.trim();

      if (!phoneRaw) {
        alert("電話番号を入力してください");
        return;
      }

      const cleanNumber = cleanPhoneNumber(phoneRaw);
      if (!cleanNumber) {
        alert("電話番号の形式を確認してください");
        return;
      }

      const now = new Date();
      alarmDate = new Date();
      alarmDate.setHours(hour, minute, second, 0);

      if (alarmDate <= now) {
        alarmDate.setDate(alarmDate.getDate() + 1);
      }

      lastSpokenCount = null;
      stopAlarmSound();

      targetDisplay.textContent =
        String(hour).padStart(2, "0") + ":" +
        String(minute).padStart(2, "0") + ":" +
        String(second).padStart(2, "0");

      phoneDisplay.textContent = phoneRaw;

      callBtn.href = "tel:" + cleanNumber;
      callBtn.classList.remove("show");
      countdownEl.classList.remove("warn", "now");
      countdownEl.textContent = "待機中";

      setupCard.classList.add("hidden");
      statusCard.classList.remove("hidden");

      speak("スタンバイを開始しました");

      if (timer) clearInterval(timer);
      timer = setInterval(tick, 100);
    }

    function backToSetup() {
      if (timer) clearInterval(timer);
      stopAlarmSound();
      speechSynthesis.cancel();
      callBtn.classList.remove("show");
      countdownEl.classList.remove("warn", "now");
      statusCard.classList.add("hidden");
      setupCard.classList.remove("hidden");
    }

    function tick() {
      const now = new Date();
      const diff = alarmDate - now;

      if (diff <= 0) {
        clearInterval(timer);
        countdownEl.classList.remove("warn");
        countdownEl.classList.add("now");
        countdownEl.textContent = "今です";
        callBtn.classList.add("show");
        startAlarmSound();
        speak("今です");
        return;
      }

      const secondsLeft = Math.ceil(diff / 1000);

      if (secondsLeft <= 10) {
        countdownEl.classList.add("warn");
        countdownEl.textContent = secondsLeft;
      } else {
        countdownEl.classList.remove("warn");
        const minutes = Math.floor(secondsLeft / 60);
        const seconds = secondsLeft % 60;
        countdownEl.textContent =
          String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");
      }

      if (secondsLeft <= 5 && secondsLeft > 0 && lastSpokenCount !== secondsLeft) {
        lastSpokenCount = secondsLeft;
        speak(String(secondsLeft));
      }
    }

    callBtn.addEventListener("click", () => {
      stopAlarmSound();
    });

    startBtn.addEventListener("click", startStandby);
    cancelBtn.addEventListener("click", backToSetup);
  </script>
</body>
</html>
